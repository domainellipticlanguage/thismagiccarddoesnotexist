service: thismagiccarddoesnotexist3

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  memorySize: 2048
  timeout: 120
  environment:
    DYNAMODB_TABLE: ${self:service}-${sls:stage}
    S3_BUCKET: ${self:service}-${sls:stage}
    LLM_PROVIDER: ${env:LLM_PROVIDER, 'groq'}
    GROQ_API_KEY: ${env:GROQ_API_KEY, ''}
    GROQ_MODEL: ${env:GROQ_MODEL, 'llama-3.3-70b-versatile'}
    CEREBRAS_API_KEY: ${env:CEREBRAS_API_KEY, ''}
    REPLICATE_API_TOKEN: ${env:REPLICATE_API_TOKEN, ''}
    IS_DEBUG: ${env:IS_DEBUG, 'false'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
          Resource:
            - !GetAtt CardsTable.Arn
            - !Sub "${CardsTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: !Sub "arn:aws:s3:::${self:service}-${sls:stage}/*"

functions:
  app:
    handler: handler.handler
    events:
      - httpApi: "*"

resources:
  Resources:
    CardsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: dummyHashKey
            AttributeType: "N"
          - AttributeName: sequenceNumber
            AttributeType: "N"
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: SequenceNumberIndex
            KeySchema:
              - AttributeName: dummyHashKey
                KeyType: HASH
              - AttributeName: sequenceNumber
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    CardAssetsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${sls:stage}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false

    CardAssetsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref CardAssetsBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: s3:GetObject
              Resource: !Sub "arn:aws:s3:::${self:service}-${sls:stage}/*"
