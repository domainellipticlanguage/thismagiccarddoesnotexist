AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: This Magic Card Does Not Exist v3

Globals:
  Function:
    Timeout: 120
    MemorySize: 2048
    Runtime: nodejs22.x
    Architectures:
      - arm64

Parameters:
  Stage:
    Type: String
    Default: dev
  LlmProvider:
    Type: String
    Default: groq
  GroqApiKey:
    Type: String
    Default: ""
    NoEcho: true
  GroqModel:
    Type: String
    Default: llama-3.3-70b-versatile
  CerebrasApiKey:
    Type: String
    Default: ""
    NoEcho: true
  ReplicateApiToken:
    Type: String
    Default: ""
    NoEcho: true
  IsDebug:
    Type: String
    Default: "false"

Resources:
  AppFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: .
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref CardsTable
          S3_BUCKET: !Ref CardAssetsBucket
          LLM_PROVIDER: !Ref LlmProvider
          GROQ_API_KEY: !Ref GroqApiKey
          GROQ_MODEL: !Ref GroqModel
          CEREBRAS_API_KEY: !Ref CerebrasApiKey
          REPLICATE_API_TOKEN: !Ref ReplicateApiToken
          IS_DEBUG: !Ref IsDebug
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CardsTable
        - S3CrudPolicy:
            BucketName: !Ref CardAssetsBucket
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: esm
        Minify: true
        Target: es2020
        Sourcemap: true
        MainFields: module,main
        EntryPoints:
          - handler.ts
        External:
          - "@napi-rs/canvas"
        OutExtension:
          - .js=.mjs

  CardsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "thismagiccarddoesnotexist3-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: dummyHashKey
          AttributeType: "N"
        - AttributeName: sequenceNumber
          AttributeType: "N"
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SequenceNumberIndex
          KeySchema:
            - AttributeName: dummyHashKey
              KeyType: HASH
            - AttributeName: sequenceNumber
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  CardAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "thismagiccarddoesnotexist3-${Stage}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  CardAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CardAssetsBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::thismagiccarddoesnotexist3-${Stage}/*"

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
